[build]
builder = "dockerfile"

[deploy]
startCommand = "python scripts/ensure_storage_buckets.py && python -c \"import os, uvicorn; uvicorn.run('app.main:app', host='0.0.0.0', port=int(os.environ.get('PORT', 8000)))\""
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

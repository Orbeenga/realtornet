# A generic, single database configuration for RealtorNet

[alembic]
# Path to migration scripts
script_location = app/db/migrations

# Template used to generate migration file names with timestamps
# Format: YYYYMMDD_HHMM-<revision>_<slug>
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# Timezone for migration timestamps (requires python>=3.9)
# timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Run environment during 'revision' command for autogenerate
revision_environment = true

# Allow .pyc and .pyo files without source .py file
sourceless = false

# Version path separator - use OS default
version_path_separator = os

# Output encoding for revision files
output_encoding = utf-8

# Database URL - LEAVE EMPTY, env.py will use settings.DATABASE_URI
# This allows proper environment-specific configuration
# sqlalchemy.url = 

# Autogenerate configuration
[alembic:autogenerate]
# Compare column types during autogenerate
compare_type = true

# Compare server defaults during autogenerate
compare_server_default = true

# Don't autogenerate schemas
include_schemas = false


[post_write_hooks]
# Optional: Format generated migrations with black
# Uncomment to enable:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
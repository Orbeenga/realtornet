# realtornet/pytest.ini

[pytest]
#--------------------------------------------------------------------
# Core Configuration
#--------------------------------------------------------------------
# Explicitly define the directory where tests are located for clarity
testpaths = tests

# Define standard naming conventions for test discovery (usually defaults, but explicit is good)
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

#--------------------------------------------------------------------
# Reporting and Execution Options (`addopts`)
#--------------------------------------------------------------------
# -ra:        Show extra test summary info for all results except 'passed' (p). Helps spot issues quickly.
# -q:         Quiet mode - less verbose output during collection/execution for cleaner results view.
# --color=yes: Ensure colored output, especially useful in CI or terminals that might not auto-detect.
# --strict-markers: Fail the test run if any unknown @pytest.mark(...) markers are used (catches typos).
# --cov=app:  *** Activate code coverage analysis for the 'app' directory (requires pytest-cov). ***
# --cov-report=term-missing: Show a coverage report in the terminal, highlighting lines NOT covered by tests.
# --cov-fail-under=92.78: *** Fail the entire test suite if total code coverage drops below 92.78%. ***
addopts = -ra -q --color=yes --strict-markers --cov=app --cov-report=term-missing --cov-fail-under=92.78

#--------------------------------------------------------------------
# Warning Filtering (`filterwarnings`)
#--------------------------------------------------------------------
# Ignore specific warnings during test runs to keep output clean.
# Add patterns as needed based on warnings you encounter from dependencies.
filterwarnings =
    ignore::DeprecationWarning 
    # Example: Ignore standard deprecation warnings globally
    # ignore::UserWarning::sqlalchemy # Example: Ignore specific UserWarnings from SQLAlchemy

#--------------------------------------------------------------------
# Code Coverage Specific Configuration (`pytest-cov`)
#--------------------------------------------------------------------
# Although settings are in addopts, you might configure omissions here if preferred,
# or use a dedicated .coveragerc or pyproject.toml [tool.coverage.run] section.
# This section demonstrates how it *could* look if pytest-cov reads it from pytest.ini.
# Note: The --cov-report and --cov options in addopts often take precedence or work alongside.
[coverage:run]
# Omit specific files/directories from coverage calculation.
# Crucial for excluding test code itself, virtual environments, configs, migrations etc.
omit =
    */tests/* # Exclude all test code
    */venv/* # Exclude virtual environment files
    app/core/config.py        # Often not practical to unit test settings loading directly
    app/main.py               # Often omitted if it's mostly FastAPI/Uvicorn setup
    app/db/migrations/* # Alembic migration scripts are typically not unit tested
    app/__init__.py           # Often empty or minimal imports
    app/core/__init__.py      # etc. for other __init__.py files
    # Add any other files/patterns you want to exclude
    */migrations/*
    */alembic/*
    app/celery_worker.py
    app/views.py
    */__pycache__/*
    */venv/*


[coverage:report]
# Configuration for coverage reports (term-missing in addopts covers the main terminal report)
# You can add options here if generating other report types (like HTML)
# show_missing = True       # Already handled by term-missing report type
# skip_covered = False      # Set to True to hide fully covered files from the report for brevity
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

# .github/workflows/ci.yml
name: RealtorNet Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/testdb
      TEST_POSTGRES_DB: testdb
      SECRET_KEY: ci-test-secret-key-minimum-64-characters-not-for-production-use-only
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      ENV: testing
      PYTHONPATH: .
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify migration state
        run: |
          python -m alembic current
          echo "Migration check passed"

      - name: Run tests with coverage gate
        run: |
          pytest --tb=short -q

      - name: Check code formatting
        run: |
          pip install black
          black --check app/ tests/
